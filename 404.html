<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:  black;
      --teal: red;
      --gray: #9a9a9a;
      --line: #eaeaea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Poppins', 'Arial Narrow', Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
      overflow-x: hidden;
    }

    .vline {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: var(--line);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tick {
      width: 1px;
      height: 40px;
      background: var(--line);
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
    }

    .error-code {
      font-family: 'Poppins', 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(5.5rem, 20vw, 10rem);
      line-height: 1;
      letter-spacing: -2px;
      color: var(--ink);
      position: relative;
      display: inline-block;
      text-shadow: 7px 7px 0 var(--teal);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.25s forwards, glitch 5.5s ease-in-out 1.2s infinite;
    }

    @keyframes glitch {
      0%, 92%, 100% { text-shadow: 7px 7px 0 var(--teal); transform: translate(0, 0); }
      93% { text-shadow: -6px 5px 0 var(--teal); transform: translate(2px, -1px); }
      94% { text-shadow:  6px -5px 0 var(--teal); transform: translate(-2px, 1px); }
      95% { text-shadow: -4px -4px 0 var(--teal); transform: translate(1px, 2px); }
      96% { text-shadow: 7px 7px 0 var(--teal); transform: translate(0, 0); }
    }

    .title {
      font-family: 'Poppins', 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 20px;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }

    .desc {
      color: var(--ink);
      font-size: 0.95rem;
      line-height: 1.75;
      max-width: 380px;
      margin: 18px auto 34px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.55s forwards;
    }

    .btn-home {
      display: inline-block;
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--ink);
      padding: 15px 42px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Poppins', Arial, sans-serif;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.25s ease;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.7s forwards;
    }
    .btn-home:hover {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
      transform: translateY(-3px);
    }
    .btn-home:active { transform: translateY(-1px); }

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.85s forwards;
    }

    .social-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }
    .social-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .social-btn svg.ig-icon {
      fill: none;
    }
    .social-btn svg.ig-icon .ig-dot {
      fill: currentColor;
      stroke: none;
    }
    .social-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      transform: translateY(-3px);
    }

    @media (max-width: 480px) {
      .error-code { text-shadow: 5px 5px 0 var(--teal); letter-spacing: -1px; }
      .btn-home   { padding: 14px 32px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="vline"></div>

  <main class="wrap">
    <div class="tick"></div>

    <h1 class="error-code">404</h1>
    <h2 class="title">Page Not Found</h2>
    <p class="desc">
      The page you are looking for might have been removed, had its
      name changed, or is temporarily unavailable.
    </p>

    <a class="btn-home" href="index.html">Return to Homepage</a>

    <div class="socials">
      <a class="social-btn" href="https://www.facebook.com/profile.php?id=61590639645788" aria-label="Facebook" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
      </a>
      <a class="social-btn" href="https://www.instagram.com/make_me_debtfree?igsh=MWhuM2wwbDEwMGM4bw==" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
        <svg class="ig-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle class="ig-dot" cx="17.5" cy="6.5" r="1.4"/>
        </svg>
      </a>
      <a class="social-btn" href="https://www.tiktok.com/@make.me.debt.free" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.94a8.2 8.2 0 004.79 1.53V7a4.85 4.85 0 01-1.02-.31z"/></svg>
      </a>
    </div>
  </main>

</body>
</html>
